# Render Blueprint — import at https://dashboard.render.com/blueprints
# Or create a Web Service manually and copy these settings.
services:
  - type: web
    name: testap-api
    runtime: python
    rootDir: backend
    plan: free
    buildCommand: pip install -r requirements.txt
    preDeployCommand: alembic upgrade head
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        sync: false
      - key: REQUIRE_EMAIL_VERIFICATION
        value: "false"
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: RESEND_API_KEY
        sync: false
